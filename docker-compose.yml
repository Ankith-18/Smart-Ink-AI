services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - '5173:5173'
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - ML_SERVICE_URL=http://ml-service:8001
    ports:
      - '8000:8000'
    depends_on:
      - ml-service

  ml-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    ports:
      - '8001:8001'
